<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-Native Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Username input -->
<div id="welcome-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Welcome to Jin's Quiz!</h2>
            <p>Please choose a nickname</p>
            <input type="text" id="nickname-input" placeholder="Type here and press Enter..." autocomplete="off">
            <br>
            <button id="guest-btn" class="text-btn">Play as a guest</button>
        </div>
    </div>
    <!-- Placeholder -->
    <div class="quiz-container blurred" id="main-quiz">
        <div id="question-container">
            <h2 id="question">Loading...</h2>
            <h2 id="feedback-text"></h2>
            <div id="answer-buttons" class="btn-grid"></div>
        </div>
        <button id="next-btn" class="hide">Next question</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
